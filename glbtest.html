<!DOCTYPE html>
<html lang="en">
<head>
	<title>glb test</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		body { margin: 0; overflow: hidden; background: #222; }
		#log { position: fixed; top: 8px; left: 8px; font: 12px monospace; color: #0f0; white-space: pre; z-index: 10; }

		/* --- label overlay (2D screen layer, never rotates with scene) --- */
		#overlay { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
		#overlay svg { position: absolute; inset: 0; width: 100%; height: 100%; }
		.obj-border {
			position: absolute;
			border: 3px solid #2b8cff;
			border-radius: 22px;
			box-sizing: border-box;
		}
		.obj-label {
			position: absolute;
			transform: translate(0, -50%);      /* vertical-center on anchor y */
			padding: 5px 10px;
			font: 13px/1 system-ui, sans-serif;
			color: #cfe4ff;
			background: #1a2330;
			border: 2px solid #2b8cff;
			border-radius: 8px;
			white-space: nowrap;
		}
	</style>
</head>
<body>
	<div id="log">loading…</div>

	<!-- 2D overlay: SVG holds the leader lines, divs hold borders + labels -->
	<div id="overlay">
		<svg id="lines"></svg>
	</div>

	<script>
		const THREE_VERSION = '0.180.0';
		const importmap = document.createElement( 'script' );
		importmap.type = 'importmap';
		importmap.textContent = JSON.stringify( {
			imports: {
				'three': `https://cdn.jsdelivr.net/npm/three@${THREE_VERSION}/build/three.module.js`,
				'three/addons/': `https://cdn.jsdelivr.net/npm/three@${THREE_VERSION}/examples/jsm/`
			}
		} );
		document.currentScript.after( importmap );
	</script>

	<script type="module">
		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

		const log = ( m ) => document.getElementById( 'log' ).textContent = m;

		const scene = new THREE.Scene();
		scene.background = new THREE.Color( 0x222222 );

		const camera = new THREE.PerspectiveCamera( 45, innerWidth / innerHeight, 0.01, 10000 );

		const renderer = new THREE.WebGLRenderer( { antialias: true } );
		renderer.setPixelRatio( devicePixelRatio );
		renderer.setSize( innerWidth, innerHeight );
		renderer.setAnimationLoop( render );
		document.body.appendChild( renderer.domElement );

		scene.add( new THREE.HemisphereLight( 0xffffff, 0x444444, 3 ) );
		const dir = new THREE.DirectionalLight( 0xffffff, 3 );
		dir.position.set( 1, 2, 1 );
		scene.add( dir );

		const controls = new OrbitControls( camera, renderer.domElement );

		// ---- label system: any glb added here gets a border+line+label ----
		const overlay = document.getElementById( 'overlay' );
		const svg = document.getElementById( 'lines' );
		const SVGNS = 'http://www.w3.org/2000/svg';
		const labelled = [];   // { obj, name, box, border, label, line }
		const PAD = 12;        // px of breathing room around object
		const GAP = 90;        // px the label sits out to the right of the border

		function addLabel( obj, name ) {

			const border = document.createElement( 'div' );
			border.className = 'obj-border';
			overlay.appendChild( border );

			const label = document.createElement( 'div' );
			label.className = 'obj-label';
			label.textContent = name;
			overlay.appendChild( label );

			const line = document.createElementNS( SVGNS, 'polyline' );
			line.setAttribute( 'fill', 'none' );
			line.setAttribute( 'stroke', '#2b8cff' );
			line.setAttribute( 'stroke-width', '3' );
			svg.appendChild( line );

			labelled.push( { obj, name, box: new THREE.Box3(), border, label, line } );

		}

		const _v = new THREE.Vector3();

		function updateLabels() {

			const w = innerWidth, h = innerHeight;

			for ( const L of labelled ) {

				// project the object's world-space bounding box to screen pixels
				L.box.setFromObject( L.obj );
				let minX = Infinity, minY = Infinity, maxX = - Infinity, maxY = - Infinity;
				let anyFront = false;

				for ( let i = 0; i < 8; i ++ ) {
					_v.set(
						i & 1 ? L.box.max.x : L.box.min.x,
						i & 2 ? L.box.max.y : L.box.min.y,
						i & 4 ? L.box.max.z : L.box.min.z
					);
					_v.project( camera );                       // -> NDC
					if ( _v.z < 1 ) anyFront = true;
					const sx = ( _v.x * 0.5 + 0.5 ) * w;
					const sy = ( - _v.y * 0.5 + 0.5 ) * h;
					if ( sx < minX ) minX = sx;
					if ( sy < minY ) minY = sy;
					if ( sx > maxX ) maxX = sx;
					if ( sy > maxY ) maxY = sy;
				}

				if ( ! anyFront ) {   // fully behind camera -> hide
					L.border.style.display = 'none';
					L.label.style.display = 'none';
					L.line.style.display = 'none';
					continue;
				}
				L.border.style.display = L.label.style.display = L.line.style.display = '';

				minX -= PAD; minY -= PAD; maxX += PAD; maxY += PAD;

				// border box
				L.border.style.left = minX + 'px';
				L.border.style.top = minY + 'px';
				L.border.style.width = ( maxX - minX ) + 'px';
				L.border.style.height = ( maxY - minY ) + 'px';

				// label sits out to the right, vertically at box top
				const labelX = maxX + GAP;
				const labelY = minY;
				L.label.style.left = labelX + 'px';
				L.label.style.top = labelY + 'px';

				// elbow leader: box right-edge -> out -> up/down to label
				const startX = maxX, startY = ( minY + maxY ) / 2;
				L.line.setAttribute( 'points', `${startX},${startY} ${labelX},${startY} ${labelX},${labelY}` );

			}

		}

		function render() {
			updateLabels();
			renderer.render( scene, camera );
		}

		new GLTFLoader().load(
			'cauldron.glb',
			( gltf ) => {
				scene.add( gltf.scene );

				const box = new THREE.Box3().setFromObject( gltf.scene );
				const size = box.getSize( new THREE.Vector3() );
				const center = box.getCenter( new THREE.Vector3() );
				const maxDim = Math.max( size.x, size.y, size.z );

				controls.target.copy( center );
				camera.position.set( center.x, center.y, center.z + maxDim * 2.5 );
				camera.near = maxDim / 100;
				camera.far = maxDim * 100;
				camera.updateProjectionMatrix();
				controls.update();

				addLabel( gltf.scene, 'cauldron.glb' );

				log( `loaded ok\nsize: ${size.x.toFixed(3)} ${size.y.toFixed(3)} ${size.z.toFixed(3)}\nmaxDim: ${maxDim.toFixed(3)}` );
			},
			( e ) => log( `loading… ${( e.loaded / 1024 | 0 )} KB` ),
			( err ) => log( `ERROR: ${err.message || err}` )
		);

		addEventListener( 'resize', () => {
			camera.aspect = innerWidth / innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize( innerWidth, innerHeight );
		} );
	</script>
</body>
</html>
